# --- Pesos do score de intenção (peso, não match cru) -----------------------
weights:
  intencao: 1.0
  comportamento_venda: 0.5
  checkout: 2.0
  cta_legenda: 1.5         # sinal de vendedor na legenda (funil digital)
  density_bonus_max: 2.0   # bônus proporcional à densidade de comentários de intenção
  # Piso de intenção de comentário p/ marcar "demanda confirmada" (senão é "vendedor")
  min_intent_comments_for_demand: 2

# --- Caps do run --live (escala "enxuto ~50 créditos") ----------------------
caps:
  max_search_pages: 1        # páginas de busca por keyword
  max_hashtags: 30           # teto de chamadas /search/hashtag no run (cobre pt+es+en)
  max_comment_fetches: 200   # teto de fetches (era 100 — batia antes de avaliar os ~288 candidatos do N0)
  max_posts_per_author: 2    # dedup: até N posts do mesmo autor (variedade + volume)
  max_pages_per_hashtag: 5   # pagina fundo p/ oferta + achar inéditos
  target_produtos: 50        # para de gastar fetch ao atingir a meta (era 30 — subiu junto c/ fetch)

# --- Precificação (ajustar ao teu plano) ------------------------------------
pricing:
  credit_usd: 0.002          # custo por crédito ScrapeCreators (placeholder — ajustar)
  assumed_credits_per_search_request: 1
  assumed_credits_per_comment_request: 1

  # Nível 2 — Haiku 4.5 via Batch API (−50%). Preço/1M tokens em USD.
  # Sticker Haiku 4.5: $1.00 input / $5.00 output. Batch = metade.
  haiku_batch_input_usd_per_mtok: 0.50
  haiku_batch_output_usd_per_mtok: 2.50
  est_input_tokens_per_post: 600     # legenda + 1 pág. de comentários + prompt
  est_output_tokens_per_post: 150    # JSON estruturado {produto,preço,score,nicho}
  model_tier2: "claude-haiku-4-5"    # MODEL_TIER2 (env pode sobrescrever)

# =============================================================================
# Meta Ads (Facebook Ad Library) — fonte separada, sem comentário.
# Sinal de demanda = TEMPO DE VEICULAÇÃO (anúncio que sobrevive ao teste do
# mercado), não intenção em comentário. Termos EXATOS do doc do operador
# ("Minerando o Meta Ads") — não inventar/traduzir.
# =============================================================================
meta_ads:
  enabled: true
  country: "BR"
  media_type: "ALL"          # era só VIDEO — 99.9% do pool elegível morria no filtro de 15
                              # dias; infoproduto low-ticket é majoritariamente imagem/carrossel
  status: "ACTIVE"           # só anúncio ativo agora
  dias_ativos_min: 15        # doc: "Mais de 15 dias ativos"
  dias_ativos_ideal_max: 30  # doc: faixa recomendada 15-30 dias — também é o teto de
                              # normalização do tempo ativo (satura aqui, não cresce pra
                              # sempre — conta de anos não deve dominar o ranking só por ser
                              # antiga; ver meta_ativo_norm)
  max_queries: 40            # cobre as 32 keywords atuais + margem (era 30)
  max_pages_per_query: 10    # era 4 — Meta é 1 crédito/request, barato escalar; página
                              # funda tende a puxar conta pequena (não domina o topo por
                              # impressão), mais parecido com o vendedor que o doc quer
  target_produtos: 50        # era 30 — sobe junto com o pool maior de max_pages_per_query
  max_ads_por_pagina: 2      # "não repetir": limite de anúncios da MESMA página no resultado
                              # final (dentro da mesma varredura — diferente de pular_vistos,
                              # que evita re-achar entre varreduras)
  # Confirmação de formato digital: keyword do PDF (preço, "Kit", "Pack") é genérica
  # demais sozinha — bate em clínica, hotel, revenda física. Só aceita o anúncio se
  # ELE TAMBÉM tiver algum sinal inequívoco de entrega digital (deliberadamente sem
  # os termos genéricos do grupo "formato" acima, senão vira circular).
  confirmacao_digital:
    - "pdf"
    - "arquivo digital"
    - "editável"
    - "editavel"
    - "canva"
    - "molde"
    - "moldes"
    - "apostila"
    - "planilha"
    - "template"
    - "printable"
    - "digital download"
    - "download"
    - "e-mail"
    - "email"
    - "imprimir"
    - "imprimível"
    - "imprimivel"
  keywords:
    precificacao:
      - "Apenas R$10"
      - "Apenas R$9,90"
      - "Apenas R$14,90"
      - "Apenas R$19,90"
      - "Apenas R$29,90"
    formato:
      - "Kit"
      - "Pack"
      - "Moldes Prontos"
      - "Modelos Editáveis"
      - "Arquivo em PDF"
      - "Projetos Prontos"
      - "Para Imprimir"
      - "Pronto para Imprimir"
      - "Prontas para Imprimir"
      - "Baixe Agora"
      - "Baixar Agora"
      - "Imprima"
    linguagem_entrega:
      - "Envio por e-mail"
      - "Recebe na hora"
      - "Acesso imediato"
      - "Download imediato"
      - "Pronto para imprimir"
      - "Arquivo digital"
      - "Link para download"
      - "Disponibilizamos em PDF"
    quantidade:
      - "Kit com 250"
      - "250 Atividades"
      - "300 Atividades"
      - "500 Atividades"
      - "1000 Atividades"
      - "100 Exercícios"
