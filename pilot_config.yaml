# --- Estratégia de descoberta -----------------------------------------------
# mode: "hashtag" (recomendado — acha vendedor de nicho) ou "top" (busca por query)
discovery:
  mode: "hashtag"
  # Metodologia do operador: minera FORMATO + PRECIFICAÇÃO, não nicho. Cada hashtag
  # vira uma chamada /search/hashtag. Mercados ligáveis/desligáveis.
  enabled_markets: ["formato_digital", "formato_criativo", "formato_es_en"]  # digital, pt+es+en
  pular_vistos: true   # novidade na fonte: pula posts já vistos em runs anteriores
  markets:
    # Formato de Entrega (digital, pt) — acha o vendedor de PDF/apostila/molde direto
    formato_digital:
      - "apostila"
      - "moldes"
      - "printable"
      - "planilhas"
      - "planilhaexcel"
      - "materialdigital"
      - "arquivodigital"
      - "editaveiscanva"
      - "atividadesparaimprimir"
      - "packdigital"
      - "apostiladigital"
      - "papelariacriativa"
      - "treinonailart"
      - "ebook"
      - "kit"
      - "catalogo"
      - "vetor"
      - "atividades"
      - "modeloseditaveis"
      - "mapamental"
    # Formato criativo/editável
    formato_criativo:
      - "templatecanva"
      - "presetlightroom"
      - "artesdigitais"
    # Formato digital em espanhol/inglês (mercado global de infoproduto)
    formato_es_en:
      - "plantillas"
      - "imprimibles"
      - "digitaldownload"
      - "canvatemplates"
      - "printables"
      - "plantillascanva"
    # Físico/revenda (sinal de demanda forte no comentário)
    fisico_revenda:
      - "achadinhos"
      - "lojade10"
      - "importados"

  # Busca por KEYWORD LIVRE (query direta em /search/top, não hashtag) — soma ao modo
  # hashtag, não substitui (achado: muito conteúdo válido não usa as hashtags curadas).
  # Sem lista própria: reaproveita as MESMAS palavras já usadas (hashtags dos mercados
  # ativos + termos do Meta Ads/PDF) — derivado em seed_keywords.py, não duplicado aqui.
  keyword_search:
    enabled: true
    recency_days: 15       # mais curto que o hashtag (365d) — keyword livre traz
                            # conteúdo mais solto/genérico, prioriza o mais fresco
    max_pages: 10
    max_items: 50           # teto por keyword — o que vier primeiro entre páginas e itens
    max_keywords: 30        # teto de termos livres buscados por run — as 61 palavras
                            # derivadas cabem em mais de 1 run (novidade já evita repetir);
                            # sem isso, 61 termos x 10 páginas explode custo/tempo do run
    abs_min_comments: 100   # piso bem mais alto que o hashtag (3) — canal mais ruidoso;
                            # NÃO mexe no piso do hashtag, que já provou preservar nicho pequeno

# --- Parâmetros da busca /v1/tiktok/search/top (usado por keyword_search) ----
search:
  publish_time: "this-month"  # era "this-week" — cobre a janela de 15d+ margem; o corte
                               # exato vem do filtro client-side (keyword_search.recency_days)
  sort_by: "relevance"        # relevance | most-liked | date-posted
  region: "BR"

# --- Filtro de idioma (dropa #ebook internacional, hotmart espanhol) ---------
language:
  require_ptbr: true

# --- Thresholds da cascata (RELATIVO por hashtag, não global) ----------------
# Cada hashtag contribui com seus MELHORES posts (breadth), com piso absoluto
# baixo só pra dropar post morto. Evita matar nicho de baixo engajamento.
thresholds:
  abs_min_comments: 3      # piso absoluto (dropa post morto)
  abs_min_likes: 10
  relative_top_frac: 1.0   # mantém TODOS de cada hashtag (mais oferta)
  intent_threshold: 2.0    # Nível 1: score mínimo pra sobreviver (afrouxado p/ + resultados)
  recency_days: 365        # infoproduto é evergreen; janela larga p/ mais oferta (era 180 — 51% do total_buscado morria aqui)
  exigir_demanda_confirmada: true  # modo teste: só produtos com demanda confirmada no comentário

# --- Score final: demanda dominante + engajamento ponderado (Bloco 3) -------
score:
  peso_demanda: 0.7        # demanda (intenção+CTA) domina — não virar ranking de viral
  peso_engajamento: 0.3
  pesos_engaj: {views: 0.4, likes: 0.3, comentarios: 0.3}
  # referência p/ normalizar em escala log (o que conta como "alto")
  ref_engaj: {views: 1000000, likes: 100000, comentarios: 5000}

# --- High-ticket a dropar (queremos LOW-ticket) — Bloco 4 -------------------
