    - "por apenas"
    - "link na bio"
    - "frete grátis"
    - "últimas unidades"
    - "arraste pra cima"
    - "compre agora"
    - "garanta o seu"
    - "acesso imediato"

  # CTA de legenda — sinal de que HÁ vendedor (funil digital off-platform).
  # Recupera vendedor de PDF/ebook/planilha cuja demanda não vira comentário.
