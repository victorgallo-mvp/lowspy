# =============================================================================
# Piloto — configuração editável (config, NÃO hardcode)
# Fase 0 do MVP: valida coleta + custo via ScrapeCreators (TikTok orgânico).
# =============================================================================

# --- Seeding: 3 grupos de keyword -------------------------------------------
keywords:
  # Grupo 1 — Produto (termos do operador). No piloto, estes são as QUERIES
  # da busca /v1/tiktok/search/top (escolha: product-specific, região BR).
  produto:
    - "pdf"
    - "planilha excel"
    - "ebook 10 reais"

  # Grupo 2 — Comportamento de venda (usado no gate de intenção, Nível 1).
  comportamento_venda:
    - "por apenas"
    - "link na bio"
    - "frete grátis"
    - "últimas unidades"
    - "arraste pra cima"
    - "compre agora"
    - "garanta o seu"
    - "acesso imediato"

  # CTA de legenda — sinal de que HÁ vendedor (funil digital off-platform).
  # Recupera vendedor de PDF/ebook/planilha cuja demanda não vira comentário.
  cta_legenda:
    - "acesse meu perfil"
    - "acesse o perfil"
    - "link no perfil"
    - "link do meu perfil"
    - "no meu perfil"
    - "link na bio"
    - "clique no link"
    - "tenha acesso"
    - "acesse já"
    - "para adquirir"
    - "adquira"
    - "material completo"
    - "apostila completa"
    - "planilha completa"
    - "pdf completo"
    - "garanta o seu"
    - "baixe agora"
    # Linguagem de Entrega (do doc do operador) — recupera vendedor digital
    - "acesso imediato"
    - "recebe na hora"
    - "download imediato"
    - "envio por e-mail"
    - "envio por email"
    - "pronto para imprimir"
    - "prontas para imprimir"
    - "arquivo digital"
    - "link para download"
    - "disponibilizamos em pdf"
    - "para imprimir"
    - "baixar agora"

  # Grupo 3 — Domínios de checkout (sinal mais forte de que há produto à venda).
  checkout:
    - "hotmart"
    - "kiwify"
    - "cakto"
    - "ticto"
    - "braip"
    - "monetizze"
    - "eduzz"
    - "pepper"

# --- Palavras de intenção de compra (Nível 1) -------------------------------
intencao:
  - "quero"
  - "eu quero"
  - "quero comprar"
  - "preço"
  - "quanto"
  - "quanto custa"
  - "quanto é"
  - "onde compro"
  - "onde comprar"
  - "como compro"
  - "como comprar"
  - "manda o link"
  - "me manda"
  - "tem link"
  - "disponível"
  - "vendе"          # tolera variação; substring case-insensitive
  # Intent v2 — funil off-platform (vendedor de nicho sai do TikTok)
  - "me chama"
  - "chama no whats"
  - "manda no direct"
  - "no direct"
  - "tá no insta"
  - "entrar no grupo"
  - "grupo de whatsapp"
  - "whatsapp"
  # Linguagem de Venda (do doc do operador)
  - "quero esse"
  - "quero o pdf"
  - "quero o arquivo"
  - "tem o pdf"
  - "tem o arquivo"
  - "como recebo"
  - "como recebo?"
  - "como faço pra comprar"

# --- Estratégia de descoberta -----------------------------------------------
# mode: "hashtag" (recomendado — acha vendedor de nicho) ou "top" (busca por query)
discovery:
  mode: "hashtag"
  # Metodologia do operador: minera FORMATO + PRECIFICAÇÃO, não nicho. Cada hashtag
  # vira uma chamada /search/hashtag. Mercados ligáveis/desligáveis.
  enabled_markets: ["formato_digital", "formato_criativo"]  # SÓ digital (físico desligado)
  markets:
    # Formato de Entrega (digital) — acha o vendedor de PDF/apostila/molde direto
    formato_digital:
      - "apostila"
      - "moldes"
      - "printable"
      - "planilhas"
      - "planilhaexcel"
      - "materialdigital"
      - "arquivodigital"
      - "editaveiscanva"
      - "atividadesparaimprimir"
      - "packdigital"
      - "apostiladigital"
      - "papelariacriativa"
      - "treinonailart"
    # Formato criativo/editável
    formato_criativo:
      - "templatecanva"
      - "presetlightroom"
      - "artesdigitais"
    # Físico/revenda (sinal de demanda forte no comentário)
    fisico_revenda:
      - "achadinhos"
      - "lojade10"
      - "importados"

# --- Parâmetros da busca /v1/tiktok/search/top (fallback do mode=top) --------
search:
  publish_time: "this-week"
  sort_by: "relevance"        # relevance | most-liked | date-posted
  region: "BR"

# --- Filtro de idioma (dropa #ebook internacional, hotmart espanhol) ---------
language:
  require_ptbr: true

# --- Thresholds da cascata (RELATIVO por hashtag, não global) ----------------
# Cada hashtag contribui com seus MELHORES posts (breadth), com piso absoluto
# baixo só pra dropar post morto. Evita matar nicho de baixo engajamento.
thresholds:
  abs_min_comments: 3      # piso absoluto (dropa post morto)
  abs_min_likes: 10
  relative_top_frac: 0.75  # mantém os 75% mais comentados de cada hashtag
  intent_threshold: 2.0    # Nível 1: score mínimo pra sobreviver (afrouxado p/ + resultados)
  recency_days: 90         # infoproduto é evergreen (vende por meses); ranqueia por views, não data
  exigir_demanda_confirmada: true  # modo teste: só produtos com demanda confirmada no comentário

# --- Score final: demanda dominante + engajamento ponderado (Bloco 3) -------
score:
  peso_demanda: 0.7        # demanda (intenção+CTA) domina — não virar ranking de viral
  peso_engajamento: 0.3
  pesos_engaj: {views: 0.4, likes: 0.3, comentarios: 0.3}
  # referência p/ normalizar em escala log (o que conta como "alto")
  ref_engaj: {views: 1000000, likes: 100000, comentarios: 5000}

# --- High-ticket a dropar (queremos LOW-ticket) — Bloco 4 -------------------
high_ticket:
  - "mentoria"
  - "imersão"
  - "imersao"
  - "formação"
  - "formacao"
  - "consultoria"
  - "acompanhamento"
  - "curso completo"
  - "turma de"
  - "12x de"
  - "parcelad"

# --- Pesos do score de intenção (peso, não match cru) -----------------------
weights:
  intencao: 1.0
  comportamento_venda: 0.5
  checkout: 2.0
  cta_legenda: 1.5         # sinal de vendedor na legenda (funil digital)
  density_bonus_max: 2.0   # bônus proporcional à densidade de comentários de intenção
  # Piso de intenção de comentário p/ marcar "demanda confirmada" (senão é "vendedor")
  min_intent_comments_for_demand: 2

# --- Caps do run --live (escala "enxuto ~50 créditos") ----------------------
caps:
  max_search_pages: 1        # páginas de busca por keyword
  max_hashtags: 15           # teto de chamadas /search/hashtag no run
  max_comment_fetches: 80    # teto de fetches de comentário (maior p/ confirmar ~30)
  max_posts_per_author: 2    # dedup: até N posts do mesmo autor (variedade + volume)
  max_pages_per_hashtag: 3   # pagina fundo p/ oferta (não repetir os mesmos)
  target_produtos: 30        # para de gastar fetch ao atingir a meta

# --- Precificação (ajustar ao teu plano) ------------------------------------
pricing:
  credit_usd: 0.002          # custo por crédito ScrapeCreators (placeholder — ajustar)
  assumed_credits_per_search_request: 1
  assumed_credits_per_comment_request: 1

  # Nível 2 — Haiku 4.5 via Batch API (−50%). Preço/1M tokens em USD.
  # Sticker Haiku 4.5: $1.00 input / $5.00 output. Batch = metade.
  haiku_batch_input_usd_per_mtok: 0.50
  haiku_batch_output_usd_per_mtok: 2.50
  est_input_tokens_per_post: 600     # legenda + 1 pág. de comentários + prompt
  est_output_tokens_per_post: 150    # JSON estruturado {produto,preço,score,nicho}
  model_tier2: "claude-haiku-4-5"    # MODEL_TIER2 (env pode sobrescrever)
