    - "acesse o perfil"
    - "link no perfil"
    - "link do meu perfil"
    - "no meu perfil"
    - "link na bio"
    - "clique no link"
    - "tenha acesso"
    - "acesse já"
    - "para adquirir"
    - "adquira"
    - "material completo"
    - "apostila completa"
    - "planilha completa"
    - "pdf completo"
    - "garanta o seu"
    - "baixe agora"
    # Linguagem de Entrega (do doc do operador) — recupera vendedor digital
    - "acesso imediato"
    - "recebe na hora"
    - "download imediato"
    - "envio por e-mail"
    - "envio por email"
    - "pronto para imprimir"
    - "prontas para imprimir"
    - "arquivo digital"
    - "link para download"
    - "disponibilizamos em pdf"
    - "para imprimir"
    - "baixar agora"
    # Espanhol/Inglês
    - "link en bio"
    - "link in bio"
    - "acceso inmediato"
    - "descarga inmediata"
    - "descargar ahora"
    - "instant download"
