services:
  db:
    image: postgres:16-alpine
    container_name: tiktok_miner_db
    environment:
      POSTGRES_USER: miner
      POSTGRES_PASSWORD: miner
      POSTGRES_DB: tiktok_miner
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miner -d tiktok_miner"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
